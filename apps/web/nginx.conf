server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache for hashed filenames
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SSE endpoint — MUST come before the generic /api/v0/ block.
    # Disables buffering + long read timeout so transcript streams flow.
    location ~ ^/api/v0/meetings/[^/]+/stream$ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1900s;
        chunked_transfer_encoding on;
    }

    # API reverse proxy — same origin as the SPA, eliminates CORS entirely
    location /api/v0/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        client_max_body_size 10m;
    }

    # SPA fallback — any unknown path serves index.html so TanStack Router
    # can take over on the client. Static files still match first via try_files.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
